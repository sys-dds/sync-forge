name: SyncForge Backend Hardening

on:
  pull_request:
  workflow_dispatch:

jobs:
  syncforge-backend-hardening:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run targeted SyncForge backend tests
        working-directory: apps/api
        run: |
          chmod +x ./mvnw
          ./mvnw "-Dtest=FoundationIntegrationTest,DomainFoundationIntegrationTest,RoomPermissionIntegrationTest,WebSocketGatewayIntegrationTest,ConnectionRegistryIntegrationTest,CarryForwardHardeningIntegrationTest,PresenceIntegrationTest,AwarenessIntegrationTest,OperationProtocolIntegrationTest,OperationConcurrencyIntegrationTest,DuplicateCanonicalOperationIntegrationTest,BroadcastOrderingIsolationIntegrationTest,PresenceAwarenessExpiryIntegrationTest,Pr3CarryForwardHardeningIntegrationTest,DocumentStateMaterializerIntegrationTest,ConflictResolutionIntegrationTest,OperationStateTransactionIntegrationTest,SnapshotReplayIntegrationTest,ReconnectResumeIntegrationTest,Sync016To025FunctionalIntegrationTest,WebSocketFlowControlIntegrationTest,OperationRateLimitIntegrationTest,RoomBackpressureIntegrationTest,SlowConsumerQuarantineIntegrationTest,RedisRoomEventStreamIntegrationTest,RedisStreamPublishAtomicityIntegrationTest,CrossNodePresenceIntegrationTest,NodeSwitchResumeIntegrationTest,Sync026To035FunctionalIntegrationTest,BoundedWebSocketSenderTest,DeterministicCollaborationHarnessIntegrationTest,ConcurrentEditFuzzIntegrationTest,ReplayDeterminismIntegrationTest,SnapshotEquivalenceIntegrationTest,ResumeBackfillSecurityIntegrationTest,NoLostOperationInvariantIntegrationTest,NoDuplicateOperationInvariantIntegrationTest,RoomSequenceGapInvariantIntegrationTest,PermissionRegressionIntegrationTest,ConflictTraceRegressionIntegrationTest,ProtocolVersionNegotiationIntegrationTest,ClientCapabilityNegotiationIntegrationTest,WebSocketHandshakeCompatibilityIntegrationTest,NegotiatedSessionStateIntegrationTest,CapabilityGateIntegrationTest,PermissionSafeResumeIntegrationTest,PermissionSafeBackfillIntegrationTest,PermissionSafeDocumentStateIntegrationTest,ProtocolCapabilityFunctionalIntegrationTest,Sync046To055FunctionalIntegrationTest,Pr6CarryForwardHardeningIntegrationTest,DeliveryTruthModelTest,RoomEventOutboxRepositoryIntegrationTest,RoomEventOutboxTransactionIntegrationTest,OperationServiceOutboxIntegrationTest,OutboxDispatcherIntegrationTest,RedisPublishIdempotencyIntegrationTest,StreamConsumerOffsetGapIntegrationTest,ClientAckBackfillConsistencyIntegrationTest,DeliveryTruthRecoveryIntegrationTest,Sync056To065FunctionalIntegrationTest,Pr7CarryForwardRecoveryIntegrationTest,OfflineOperationEnvelopeValidationTest,OfflineOperationIdempotencyIntegrationTest,OfflineCanonicalPayloadHashIntegrationTest,OfflineBaseRevisionValidationIntegrationTest,OfflineCausalDependencyIntegrationTest,OfflinePermissionSafetyIntegrationTest,ReconnectBackfillReplayIntegrationTest,OfflineStaleSnapshotConflictIntegrationTest,OfflineCollaborationHarnessIntegrationTest,Sync066To075FunctionalIntegrationTest,Pr8CarryForwardRecoveryIntegrationTest,CollaborativeTextModelIntegrationTest,StableTextIdentityIntegrationTest,InsertAfterOrderingIntegrationTest,TombstoneDeleteIntegrationTest,VisibleTextMaterializationIntegrationTest,TextOperationIdempotencyIntegrationTest,OfflineTextConvergenceIntegrationTest,TextReplayDeterminismIntegrationTest,TextSnapshotEquivalenceIntegrationTest,TextConvergenceFuzzIntegrationTest,Sync076To088FunctionalIntegrationTest,Pr9CarryForwardRecoveryIntegrationTest,ResumeWindowIntegrationTest,SnapshotBoundaryIntegrationTest,BoundedReplayIntegrationTest,OperationCompactionIntegrationTest,ResumeApiContractIntegrationTest,Sync089To098FunctionalIntegrationTest" test

      - name: Compile backend
        working-directory: apps/api
        run: |
          chmod +x ./mvnw
          ./mvnw -DskipTests compile

      - name: Validate SyncForge compose
        run: docker compose -f infra/docker-compose/docker-compose.yml config
