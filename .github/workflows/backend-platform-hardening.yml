name: Backend Platform Hardening

on:
  pull_request:
  workflow_dispatch:

jobs:
  backend-platform-hardening:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run targeted backend tests
        working-directory: apps/api
        run: |
          # Exact targeted backend baseline from the hardening ticket.
          chmod +x ./mvnw
          ./mvnw "-Dtest=WebhookCallbackValidationIntegrationTest,WebhookApiPathEndToEndIntegrationTest,WebhooksControllerIntegrationTest,WebhookDeliveryRelayIntegrationTest,WorkspacePlanControllerIntegrationTest,ProjectionJobWorkspaceVisibilityIntegrationTest,ProjectionJobsControllerIntegrationTest,WorkspaceQuotaEndToEndIntegrationTest" test

      - name: Compile backend
        working-directory: apps/api
        run: |
          chmod +x ./mvnw
          ./mvnw -DskipTests compile

      - name: Validate standalone platform compose
        run: docker compose -f infra/docker-compose/docker-compose.platform.yml config
