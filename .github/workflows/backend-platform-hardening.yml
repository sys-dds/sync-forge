name: SyncForge Backend Hardening

on:
  pull_request:
  workflow_dispatch:

jobs:
  syncforge-backend-hardening:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run targeted SyncForge backend tests
        working-directory: apps/api
        run: |
          chmod +x ./mvnw
          ./mvnw "-Dtest=FoundationIntegrationTest,DomainFoundationIntegrationTest,RoomPermissionIntegrationTest,WebSocketGatewayIntegrationTest,ConnectionRegistryIntegrationTest,CarryForwardHardeningIntegrationTest,PresenceIntegrationTest,AwarenessIntegrationTest,OperationProtocolIntegrationTest" test

      - name: Compile backend
        working-directory: apps/api
        run: |
          chmod +x ./mvnw
          ./mvnw -DskipTests compile

      - name: Validate SyncForge compose
        run: docker compose -f infra/docker-compose/docker-compose.yml config
