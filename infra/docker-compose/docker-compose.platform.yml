name: link-platform-platform

# Standalone platform smoke stack.
# This file is self-contained, must be run on its own, and is the compose file validated by CI.

services:
  postgres:
    image: postgres:16.8
    environment:
      POSTGRES_DB: link_platform
      POSTGRES_USER: link_platform
      POSTGRES_PASSWORD: link_platform
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U link_platform -d link_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  webhook-sink:
    image: mendhak/http-https-echo:35
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      webhook-sink:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # Standalone platform mode only references services defined in this file.
      DB_URL: jdbc:postgresql://postgres:5432/link_platform
      DB_USERNAME: link_platform
      DB_PASSWORD: link_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LINK_PLATFORM_PUBLIC_BASE_URL: http://localhost:8080
      LINK_PLATFORM_RUNTIME_MODE: all
      LINK_PLATFORM_WEBHOOKS_ENABLED: "true"
      # Local webhook smoke targets the in-cluster sink, so the docker profile must relax both dimensions explicitly.
      LINK_PLATFORM_WEBHOOKS_ALLOW_PRIVATE_CALLBACK_HOSTS: "true"
      LINK_PLATFORM_WEBHOOKS_ALLOW_HTTP_CALLBACKS: "true"
      LINK_PLATFORM_EXPORTS_ENABLED: "true"
    ports:
      - "8080:8080"
