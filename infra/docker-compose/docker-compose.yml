name: link-platform-local

# Full local multi-runtime stack.
# The platform smoke path does not overlay this file and instead runs docker-compose.platform.yml on its own.
services:
  postgres:
    image: postgres:16.8
    container_name: link-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: link_platform
      POSTGRES_USER: link_platform
      POSTGRES_PASSWORD: link_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U link_platform -d link_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.9.0
    container_name: link-platform-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: link-platform-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  control-plane-api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: link-platform-control-plane-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/link_platform
      DB_USERNAME: link_platform
      DB_PASSWORD: link_platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LINK_PLATFORM_CACHE_ENABLED: "true"
      LINK_PLATFORM_PUBLIC_BASE_URL: http://localhost:8081
      LINK_PLATFORM_RUNTIME_MODE: control-plane-api
      LINK_PLATFORM_LIFECYCLE_TOPIC: link-platform.lifecycle.link-events
    ports:
      - "8080:8080"

  redirect-eu-west-1:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: link-platform-redirect-eu-west-1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/link_platform
      DB_USERNAME: link_platform
      DB_PASSWORD: link_platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LINK_PLATFORM_CACHE_ENABLED: "true"
      LINK_PLATFORM_PUBLIC_BASE_URL: http://localhost:8081
      LINK_PLATFORM_RUNTIME_MODE: redirect
      LINK_PLATFORM_RUNTIME_REDIRECT_REGION: eu-west-1
      LINK_PLATFORM_RUNTIME_REDIRECT_FAILOVER_REGION: us-east-1
      LINK_PLATFORM_RUNTIME_REDIRECT_FAILOVER_BASE_URL: http://localhost:8082
      LINK_PLATFORM_LIFECYCLE_TOPIC: link-platform.lifecycle.link-events
    ports:
      - "8081:8080"

  redirect-us-east-1:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: link-platform-redirect-us-east-1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/link_platform
      DB_USERNAME: link_platform
      DB_PASSWORD: link_platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LINK_PLATFORM_CACHE_ENABLED: "true"
      LINK_PLATFORM_PUBLIC_BASE_URL: http://localhost:8082
      LINK_PLATFORM_RUNTIME_MODE: redirect
      LINK_PLATFORM_RUNTIME_REDIRECT_REGION: us-east-1
      LINK_PLATFORM_RUNTIME_REDIRECT_FAILOVER_REGION: eu-west-1
      LINK_PLATFORM_RUNTIME_REDIRECT_FAILOVER_BASE_URL: http://localhost:8081
      LINK_PLATFORM_LIFECYCLE_TOPIC: link-platform.lifecycle.link-events
    ports:
      - "8082:8080"

  worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: link-platform-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/link_platform
      DB_USERNAME: link_platform
      DB_PASSWORD: link_platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LINK_PLATFORM_CACHE_ENABLED: "true"
      LINK_PLATFORM_PUBLIC_BASE_URL: http://localhost:8081
      LINK_PLATFORM_RUNTIME_MODE: worker
      LINK_PLATFORM_LIFECYCLE_TOPIC: link-platform.lifecycle.link-events

  control-plane-api-query-fallback:
    profiles: ["proof"]
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: link-platform-control-plane-api-query-fallback
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/link_platform
      DB_USERNAME: link_platform
      DB_PASSWORD: link_platform
      QUERY_DB_URL: jdbc:postgresql://missing-query:5432/link_platform
      QUERY_DB_USERNAME: link_platform
      QUERY_DB_PASSWORD: link_platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LINK_PLATFORM_CACHE_ENABLED: "true"
      LINK_PLATFORM_PUBLIC_BASE_URL: http://localhost:8081
      LINK_PLATFORM_RUNTIME_MODE: control-plane-api
      LINK_PLATFORM_LIFECYCLE_TOPIC: link-platform.lifecycle.link-events
    ports:
      - "8083:8080"

  redirect-single-region:
    profiles: ["proof"]
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: link-platform-redirect-single-region
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/link_platform
      DB_USERNAME: link_platform
      DB_PASSWORD: link_platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LINK_PLATFORM_CACHE_ENABLED: "true"
      LINK_PLATFORM_PUBLIC_BASE_URL: http://localhost:8084
      LINK_PLATFORM_RUNTIME_MODE: redirect
      LINK_PLATFORM_RUNTIME_REDIRECT_REGION: single-region
      LINK_PLATFORM_LIFECYCLE_TOPIC: link-platform.lifecycle.link-events
    ports:
      - "8084:8080"

volumes:
  postgres-data:
